<!DOCTYPE html>
<html>

<head>

<title>DevOps Build System</title>

<style>

body{
    font-family: Arial;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    margin-top: 50px;
}

.container{
    width: 700px;
}

input{
    width: 70%;
    padding: 12px;
}

button{
    padding: 12px;
    background: #22c55e;
    border: none;
    color: white;
    cursor: pointer;
}

.log-box{
    background: black;
    margin-top: 20px;
    padding: 10px;
    height: 250px;
    overflow: auto;
    font-size: 12px;
}

.card{
    background: #1e293b;
    padding: 10px;
    margin-top: 10px;
}

.success{
    color: #22c55e;
}

.failed{
    color: red;
}

</style>

</head>

<body>

<div class="container">

<h1>🚀 DevOps Build System</h1>

<input id="repo" placeholder="Enter GitHub Repository URL">

<button onclick="buildRepo()">Build</button>

<h2 id="status"></h2>

<div class="log-box" id="logs"></div>

<h2>Build History</h2>

<div id="history"></div>

</div>

<script>

const API = "http://localhost:5000";

function buildRepo(){

    const repo = document.getElementById("repo").value;

    fetch(API + "/build", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({
            repo: repo
        })

    })

    .then(res => res.json())

    .then(data => {

        document.getElementById("status").innerText =
            "Build Status: " + data.status;

        document.getElementById("logs").innerText =
            data.logs;

        loadHistory();

    });

}

function loadHistory(){

    fetch(API + "/history")

    .then(res => res.json())

    .then(data => {

        let html = "";

        data.forEach(build => {

            html += `
                <div class="card">

                    <b>Repository:</b> ${build.repo} <br>

                    <b>Status:</b>
                    <span class="${build.status === 'SUCCESS' ? 'success' : 'failed'}">
                        ${build.status}
                    </span>

                    <br>

                    <b>Time:</b> ${build.time}

                </div>
            `;

        });

        document.getElementById("history").innerHTML = html;

    });

}

loadHistory();

</script>

</body>

</html>
